spring.application.name=smart-civic-backend
server.port=8080
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/smart_civic_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
app.jwt.secret=${JWT_SECRET:change-this-to-a-secure-256-bit-secret-key-for-production}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.upload.dir=${UPLOAD_DIR:uploads}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.seed.admin-email=${SEED_ADMIN_EMAIL:manpopaliya123@gmail.com}
app.seed.admin-password=${SEED_ADMIN_PASSWORD:123456}
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=60MB
