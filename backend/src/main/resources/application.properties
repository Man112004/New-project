spring.application.name=smart-civic-backend
server.port=8080
spring.datasource.url=jdbc:h2:mem:smart_civic_db
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
app.jwt.secret=${JWT_SECRET:change-this-to-a-secure-256-bit-secret-key-for-production}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.upload.dir=${UPLOAD_DIR:uploads}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.seed.admin-email=${SEED_ADMIN_EMAIL:manpopaliya123@gmail.com}
app.seed.admin-password=${SEED_ADMIN_PASSWORD:123456}
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=60MB
